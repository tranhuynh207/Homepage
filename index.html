<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Under Development</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* SKY */
.sky {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, #87CEEB, #e6f7ff);
}

/* CLOUDS */
.cloud {
    position: absolute;
    background: #fff;
    border-radius: 50px;
    opacity: 0.8;
}
.cloud::before,
.cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
}

.cloud1 {
    width: 120px;
    height: 60px;
    top: 20%;
    left: -150px;
    animation: moveClouds 40s linear infinite;
}
.cloud1::before {
    width: 70px;
    height: 70px;
    top: -30px;
    left: 10px;
}
.cloud1::after {
    width: 80px;
    height: 80px;
    top: -20px;
    right: 10px;
}

.cloud2 {
    width: 180px;
    height: 80px;
    top: 50%;
    left: -200px;
    animation: moveClouds 60s linear infinite;
}
.cloud2::before {
    width: 90px;
    height: 90px;
    top: -40px;
    left: 20px;
}
.cloud2::after {
    width: 100px;
    height: 100px;
    top: -30px;
    right: 20px;
}

@keyframes moveClouds {
    from { transform: translateX(0); }
    to { transform: translateX(120vw); }
}

/* CARD */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 40px;
    max-width: 700px;
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* TEXT */
.text {
    flex: 1;
}

h1 {
    margin-top: 0;
    font-size: 1.8em;
    color: #333;
}

p {
    font-size: 1.05em;
    color: #555;
    line-height: 1.6;
}

/* SIGN WRAPPER */
.sign-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    transform: rotate(-8deg);
}

/* ROUND SIGN */
.sign {
    width: 120px;
    height: 120px;
    background: #fff;
    border: 10px solid #d32f2f;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-weight: bold;
    color: #111;
    font-size: 0.9em;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    padding: 10px;
}

/* POLE */
.pole {
    width: 10px;
    height: 120px;
    background: linear-gradient(to bottom, #666, #999);
    margin-top: -5px;
    border-radius: 3px;
}
</style>
</head>

<body>

<div class="sky"></div>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="container">
    
    <div class="text">
        <h1>Hello, I am Trân!</h1>
        <p>
            I am currently building something cool here.<br><br>
            The site will be back soon — cleaner, nicer, and hopefully bug-free.<br><br>
            Thanks for stopping by 👀
        </p>
    </div>

    <div class="sign-wrapper">
        <div class="sign">UNDER<br>DEVELOPMENT</div>
        <div class="pole"></div>
    </div>

</div>

</body>
</html>
